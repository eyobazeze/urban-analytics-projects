<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addis Ababa Sub-City Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ============================================
         SECTION 1: HTML Structure & Semantic Tags
         ============================================
         Semantic tags describe MEANING, not just appearance.
         <div> says nothing about what's inside it.
         <header>, <nav>, <main>, <section>, <footer> tell
         both browsers AND you (reading it later) what each
         part actually is.
    -->

    <header>
        <h1>Addis Ababa Sub-City Explorer</h1>
        <p>A look at population and transit access across sub-cities</p>
    </header>

    <nav>
        <ul>
            <li><a href="#overview">Overview</a></li>
            <li><a href="#data">Data</a></li>
        </ul>
    </nav>

    <main>
        <section id="overview">
            <h2>Overview</h2>
            <p>
                This page displays sub-city data as a static example while
                you practice HTML structure and CSS layout.
            </p>
        </section>

            - A <table> with a header row (sub-city, population, area)
              and at least 3 data rows using real-ish Addis Ababa numbers
            Use <thead>, <tbody>, <tr>, <th>, <td> — this is the correct
            semantic structure for tabular data, not a bunch of <div>s.
        -->

    </main>

    <footer>
        <p>Built while learning frontend fundamentals — Eyob Azeze</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
